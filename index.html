<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>함동균 | 모바일 이력서</title>
    <meta name="description" content="화성폴리텍대학 스마트전기과 학생, 두온시스템에서 근무 중인 함동균의 모바일 이력서 및 연락처입니다.">
    <!-- Open Graph 태그 (카카오톡 등 소셜 공유용) -->
    <meta property="og:title" content="함동균 | 모바일 이력서">
    <meta property="og:description" content="화성폴리텍대학 스마트전기과 학생, 두온시스템 근무 중">
    <!-- 깃허브 페이지 호스팅을 위한 절대 경로 -->
    <meta property="og:image" content="https://hdk102012-source.github.io/hdk/og.png">
    <meta property="og:image:width" content="800">
    <meta property="og:image:height" content="800">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hdk102012-source.github.io/hdk/">
    
    <!-- 프리미엄 폰트: Pretendard -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            /* 세련된 다크 블루/슬레이트 테마 */
            --primary-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.5);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* 몽환적이고 고급스러운 메쉬 그라데이션 애니메이션 배경 */
        .background-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.2), transparent 50%),
                        radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.2), transparent 50%),
                        radial-gradient(circle at 50% 80%, rgba(16, 185, 129, 0.15), transparent 50%);
            animation: bgShift 15s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* 유리 질감(Glassmorphism) 컨테이너 */
        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 40px 24px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 프로필 아바타 영역 */
        .avatar-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 24px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .avatar:hover {
            transform: scale(1.08);
        }

        /* 살아있는 느낌(온라인)을 주기 위한 상태 표시 점 */
        .status-dot {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 22px;
            height: 22px;
            background-color: #10b981; /* Emerald Green */
            border: 4px solid #141e33; /* 배경색상과 맞춰서 자연스럽게 */
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* 텍스트 타이포그래피 */
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.03em;
            color: #ffffff;
        }

        .title {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 28px;
            line-height: 1.6;
            font-weight: 400;
            word-break: keep-all;
        }
        
        .highlight {
            color: #60a5fa;
            font-weight: 600;
        }

        /* 가로 구분선 */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            margin: 28px 0;
        }

        /* 링크 버튼 컨테이너 */
        .contact-links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 20px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }

        /* 전환 효과를 위한 마이크로 인터랙션 */
        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            transition: transform 0.4s, opacity 0.4s;
        }

        .btn:active::after {
            transform: translate(-50%, -50%) scale(2);
            opacity: 1;
            transition: 0s;
        }

        /* 전화 아이콘/버튼 */
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: white;
            box-shadow: 0 4px 15px 0 rgba(59, 130, 246, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.4);
        }

        @media (hover: hover) {
            .btn-primary:hover {
                box-shadow: 0 6px 20px rgba(59, 130, 246, 0.45);
                transform: translateY(-2px);
            }
        }

        /* 이메일 아이콘/버튼 */
        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.04);
            color: var(--text-main);
            border-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:active {
            transform: scale(0.97);
            background-color: rgba(255, 255, 255, 0.08);
        }

        @media (hover: hover) {
            .btn-secondary:hover {
                background-color: rgba(255, 255, 255, 0.08);
                transform: translateY(-2px);
                border-color: rgba(255, 255, 255, 0.2);
            }
        }

        .icon {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <!-- 움직이는 배경 그라데이션 -->
    <div class="background-animation"></div>
    
    <main class="profile-card">
        <!-- 프로필 아바타 -->
        <div class="avatar-container">
            <img src="myphoto.jpg" alt="함동균 프로필 사진" class="avatar" onerror="this.src='https://ui-avatars.com/api/?name=동균&background=3b82f6&color=fff&size=200';">
            <div class="status-dot"></div>
        </div>

        <!-- 이름 및 직책 -->
        <h1>함동균</h1>
        <p class="title">
            화성폴리텍대학 스마트전기과 학생<br>
            <span class="highlight">두온시스템</span>에서 근무 중
        </p>

        <div class="divider"></div>

        <!-- 연락처 링크 -->
        <div class="contact-links">
            <a href="tel:010-5520-5763" class="btn btn-primary">
                <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 15.5c-1.25 0-2.45-.2-3.57-.57a1.02 1.02 0 0 0-1.02.24l-2.2 2.2a15.045 15.045 0 0 1-6.59-6.59l2.2-2.21a.96.96 0 0 0 .25-1A11.36 11.36 0 0 1 8.5 4c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1 0 9.39 7.61 17 17 17 .55 0 1-.45 1-1v-3.5c0-.55-.45-1-1-1zM19 12h2a9 9 0 0 0-9-9v2c3.87 0 7 3.13 7 7zm-4 0h2c0-2.76-2.24-5-5-5v2c1.66 0 3 1.34 3 3z"/>
                </svg>
                010-5520-5763
            </a>
            
            <a href="mailto:hdk102012@gmail.com" class="btn btn-secondary">
                <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                </svg>
                hdk102012@gmail.com
            </a>
        </div>
    </main>
</body>
</html>
